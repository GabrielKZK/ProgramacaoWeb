<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Funções anônimas + DOM</title>
    <script src="../scripts/funcoes_anonima.js"></script>
</head>
<body>

    <h2>Parte 1 - Eventos</h2>

    <label for="txtV1">Valor</label>

    <button id="btRegistrar" onclick="registrar()">Registrar</button>
    <br><br>
    <button id="btExecutar">Executar</button>

    <p id="mensagem"></p>

    <hr>

    <h2>Parte 2 - DOM</h2>

    <h1 id="titulo">Título Principal</h1>

    <p class="paragrafo">Este é o primeiro parágrafo.</p>
    <p class="paragrafo">Este é o segundo parágrafo.</p>
    <p class="paragrafo">Este é o terceiro parágrafo.</p>

    <button onclick="alterarConteudo()">Clique aqui</button>

    <hr>

    <h2>Parte 3 - DOM</h2>
    <ul id="lista">
        <li>Item 1 <button onclick="removerItem(this)">Remover</button></li>
        <li>Item 2 <button onclick="removerItem(this)">Remover</button></li>
        <li>Item 3 <button onclick="removerItem(this)">Remover</button></li>
    </ul>

</body>
</html>
