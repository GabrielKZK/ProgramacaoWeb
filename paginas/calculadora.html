<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Bootstrap</title>
    <script src="..//scripts/calculadora.js"></script>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow p-4">
                    <h2 class="text-center mb-4">Calculadora</h2>

                    <form id="formCalculadora">
                        <div class="mb-3">
                            <label for="numero1" class="form-label">Primeiro número</label>
                            <input type="number" class="form-control" id="numero1" placeholder="Digite o primeiro número">
                        </div>

                        <div class="mb-3">
                            <label for="numero2" class="form-label">Segundo número</label>
                            <input type="number" class="form-control" id="numero2" placeholder="Digite o segundo número">
                        </div>

                        <div class="mb-3">
                            <label for="operacao" class="form-label">Operação</label>
                            <select class="form-select" id="operacao">
                                <option value="+">Soma (+)</option>
                                <option value="-">Subtração (-)</option>
                                <option value="*">Multiplicação (*)</option>
                                <option value="/">Divisão (/)</option>
                            </select>
                        </div>

                        <div class="d-grid">
                            <button type="button" class="btn btn-primary" onclick="calcular()">
                                Calcular
                            </button>
                        </div>
                    </form>

                    <div class="alert alert-info mt-4" id="resultado">
                        Resultado: ---
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
