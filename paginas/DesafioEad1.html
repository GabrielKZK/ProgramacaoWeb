<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafio - Formulário</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="../css/DesafioEad1.css">
</head>
<body>

  <div class="form-container">
    <h2 class="form-title">Formulário de Cadastro</h2>

    <form class="needs-validation" onsubmit="enviarFormulario(event)" novalidate>
      
      <div class="mb-3">
        <label for="nome" class="form-label">Nome</label>
        <input type="text" class="form-control" id="nome" required>
        <div class="invalid-feedback">
          Por favor, informe seu nome.
        </div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">E-mail</label>
        <input type="email" class="form-control" id="email" required>
        <div class="invalid-feedback">
          Informe um e-mail válido.
        </div>
      </div>

      <div class="mb-3">
        <label for="senha" class="form-label">Senha</label>
        <input type="password" class="form-control" id="senha" required minlength="6">
        <div class="invalid-feedback">
          A senha deve ter pelo menos 6 caracteres.
        </div>
      </div>

      <div class="mb-3">
        <label for="curso" class="form-label">Curso</label>
        <select class="form-select" id="curso" required>
          <option value="">Selecione...</option>
          <option>Ciência da Computação</option>
          <option>Análise e Desenvolvimento de Sistemas</option>
          <option>Sistemas de Informação</option>
        </select>
        <div class="invalid-feedback">
          Escolha um curso.
        </div>
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="termos" required>
        <label class="form-check-label" for="termos">
          Aceito os termos
        </label>
        <div class="invalid-feedback">
          Você precisa aceitar os termos.
        </div>
      </div>

      <div class="mb-3">
        <label for="captcha" class="form-label">Validação: Quanto é <strong>10 + 5</strong>?</label>
        <input type="number" class="form-control" id="resposta-usuario" placeholder="Digite o resultado" required>
        <div class="invalid-feedback">
          Por favor, resolva a conta para enviar.
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-enviar">
        Enviar
      </button>

    </form>
  </div>

  <script src="../scripts/DesafioEad1.js"></script>

</body>
</html>
