<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Exemplo Tabela</title>
</head>
<body>

    <table border="1" cellspacing="0" cellpadding="0" width="80%">
        <tr>
            <td align="Center" colspan="3"><h1>Personagens</h1></td>
        </tr>
        <tr>
            <td align="Center"><h4>Franquia</h4></td>
            <td align="Center"><h4>Nome</h4></td>
            <td align="Center"><h4>Imagem</h4></td>
        </tr>
        <tr>
            <td>Marvel</td>
            <td>Capitão América: O Primeiro Vingador</td>
            <td align="Center"><img src="..//imagens/19874544.jpg" alt="Capitão América" width="100px" height="110px"></td>
        </tr>
        <tr>
            <td>DC</td>
            <td>Flash</td>
            <td align="Center"><img src="../imagens/Char_Profile_Flash_20190116_5c3fcaaa18f0e8.03668117.avif" alt="Flash" width="100px"></td>
        </tr>
        <tr>
            
            <td align="Center" colspan="3">
                <table border="1" cellspacing="0" cellpadding="0" width="80%">
                    <tr>
                        <td align="Center"><h4>Franquia</h4></td>
                        <td align="Center"><h4>Nome</h4></td>
                        <td align="Center"><h4>Imagem</h4></td>
                    </tr>
                    <tr>
                        <td>HBO Max</td>
                        <td>Corrida Maluca</td>
                        <td align="Center"><img src="../imagens/painel-corrida-maluca-g-frete-gratis-decoracao-de-festa.webp" alt="Corrida Maluca" width="100px"></td>
                    </tr>
                
                </table>
            </td>
        </tr>
    </table>
    
</body>
</html>
