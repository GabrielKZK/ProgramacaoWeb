<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <SCript src="../scripts/calculadoraIMC.js"></SCript>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow rounded-4">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4">Calculadora de IMC</h2>

                        <form id="formIMC">
                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome</label>
                                <input type="text" class="form-control" id="nome" placeholder="Digite seu nome">
                            </div>

                            <div class="mb-3">
                                <label for="peso" class="form-label">Peso (kg)</label>
                                <input type="number" class="form-control" id="peso" placeholder="Ex: 70" step="0.1">
                            </div>

                            <div class="mb-3">
                                <label for="altura" class="form-label">Altura (m)</label>
                                <input type="number" class="form-control" id="altura" placeholder="Ex: 1.75" step="0.01">
                            </div>

                            <div class="mb-4">
                                <label class="form-label d-block">Sexo</label>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="sexo" id="masc" value="Masculino">
                                    <label class="form-check-label" for="masc">Masc</label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="sexo" id="fem" value="Feminino">
                                    <label class="form-check-label" for="fem">Fem</label>
                                </div>
                            </div>

                            <div class="d-grid">
                                <button type="button" class="btn btn-primary" onclick="calcularIMC()">
                                    Calcular
                                </button>
                            </div>
                        </form>

                        <div id="resultado" class="alert alert-info mt-4 d-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
